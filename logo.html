  * { box-sizing:border-box; }
  html,body {
    margin:0; padding:0; background:#fafafa;
    font-family: Arial, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh;
  }
  .stage {
    position:relative;
    width: min(94vw, 56.4vh);   /* 88vh * (1628/2337) ~ 61.3vh: lascia spazio al bottone sotto */
    aspect-ratio: 1628/2539;
    margin: 0 auto;
    background: #ffffff;
  }
  .stage img, .stage svg {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:block;
  }
  #bgImg {
    transition: filter 2.6s ease, opacity 2.6s ease;
    will-change: filter, opacity;
    height:auto;
  }
  #bgImg.blurred { filter: blur(6px); opacity:0.55; }
  #dashGroup {
    transition: filter 2.6s ease, opacity 2.6s ease;
    will-change: filter, opacity;
  }
  #dashGroup.blurred {
    opacity: 0;
  }

  svg path[id^="r"] {
    transition: transform 2.6s cubic-bezier(.65,0,.35,1);
    transform-box: view-box;
    will-change: transform;
  }

  #fisoLogo {
    position:absolute;
    width:21%;
    height:auto;
    left:49.498577083476704%;
    top:30.62947974807695%;
    transform: translate(-50%,-50%) scale(0.7);
    opacity:0;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.25));
    transition: opacity 1.1s ease, transform 1.1s ease;
    will-change: transform, opacity;
    pointer-events:none;
  }
  #fisoLogo.show {
    opacity:1;
    transform: translate(-50%,-50%) scale(1);
    transition-delay: 1.5s;
  }
  button {
    margin-top:20px; padding:10px 22px; border-radius:24px; border:2px solid #0B4D2C;
    background:white; color:#0B4D2C; font-weight:700; font-size:14px; cursor:pointer; letter-spacing:1px;
    font-family: Arial, sans-serif;
  }
  button:hover { background:#0B4D2C; color:white; }
</style>
