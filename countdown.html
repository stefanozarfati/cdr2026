<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDR 2026 – Conto alla rovescia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2e7d32;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }

  .container {
    text-align: center;
    padding: 6px 12px;
    width: 100%;
  }

  .title {
    color: #c8e6c9;
    font-size: clamp(9px, min(2.6vw, 5vh), 13px);
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: clamp(2px, 1.5vh, 6px);
  }

  .blocks {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: clamp(4px, 2vw, 16px);
  }

  .block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: clamp(44px, 14vw, 90px);
  }

  .number {
    font-size: clamp(22px, min(10vw, 26vh), 52px);
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
    text-align: center;
  }

  .unit {
    color: #ff6d00;
    font-size: clamp(7px, min(1.6vw, 4vh), 10px);
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .sep {
    color: rgba(255,255,255,0.3);
    font-size: clamp(18px, min(8vw, 22vh), 44px);
    font-weight: 900;
    line-height: 1;
    padding-top: 1px;
  }

  .in-corso {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .in-corso .icon { font-size: clamp(24px, 7vw, 40px); }

  .in-corso .msg {
    color: #ffffff;
    font-size: clamp(16px, 4vw, 26px);
    font-weight: bold;
  }

  .event-date {
    margin-top: clamp(2px, 1.5vh, 6px);
    color: rgba(255,255,255,0.4);
    font-size: clamp(7px, min(1.6vw, 4vh), 10px);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">Mancano al Campionato Italiano delle Regioni 2026</div>

  <div class="blocks" id="countdown">
    <div class="block">
      <div class="number" id="days">--</div>
      <div class="unit">Giorni</div>
    </div>
    <div class="sep">:</div>
    <div class="block">
      <div class="number" id="hours">--</div>
      <div class="unit">Ore</div>
    </div>
    <div class="sep">:</div>
    <div class="block">
      <div class="number" id="minutes">--</div>
      <div class="unit">Minuti</div>
    </div>
    <div class="sep">:</div>
    <div class="block">
      <div class="number" id="seconds">--</div>
      <div class="unit">Secondi</div>
    </div>
  </div>

  <div class="in-corso" id="inCorso">
    <div class="icon">🏅</div>
    <div class="msg">Campionato in corso!</div>
  </div>

  <div class="event-date" id="eventDate">28 agosto 2026 · ore 14:30 · Fiuggi (FR)</div>
</div>

<script>
  const START = new Date('2026-08-28T14:30:00+02:00');
  const END   = new Date('2026-08-30T13:00:00+02:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now  = new Date();
    const diff = START - now;

    if (diff > 0) {
      document.getElementById('days').textContent    = Math.floor(diff / 86400000);
      document.getElementById('hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('minutes').textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('seconds').textContent = pad(Math.floor((diff % 60000) / 1000));
    } else {
      document.getElementById('countdown').style.display  = 'none';
      document.getElementById('inCorso').style.display    = 'flex';
      document.getElementById('eventDate').style.display  = 'none';
      if (now > END) {
        document.getElementById('inCorso').querySelector('.msg').textContent  = 'Campionato concluso!';
        document.getElementById('inCorso').querySelector('.icon').textContent = '🏆';
      }
    }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
